name: Publish npm

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Run verification only or publish from main
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - publish

permissions:
  contents: read

concurrency:
  group: aiwiki-npm-publish
  cancel-in-progress: false

jobs:
  verify:
    name: Publish / verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify release
        run: npm run release:check

  guard-publish-ref:
    name: Guard publish ref
    needs: verify
    runs-on: ubuntu-latest
    if: ${{ inputs.mode == 'publish' && github.ref != 'refs/heads/main' }}
    steps:
      - name: Reject non-main publication
        run: |
          echo "Publishing is allowed only from refs/heads/main."
          exit 1

  release-gate:
    name: Verify release tag
    needs: verify
    if: ${{ inputs.mode == 'publish' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main with tags
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Verify version tag points at main
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          expected_tag="v${version}"

          if ! git tag --points-at "$GITHUB_SHA" | grep --fixed-strings --line-regexp "$expected_tag"; then
            echo "Expected $expected_tag to point at $GITHUB_SHA before publishing."
            exit 1
          fi

  publish:
    name: Publish @itradingai/aiwiki
    needs:
      - verify
      - release-gate
    if: ${{ inputs.mode == 'publish' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify release
        run: npm run release:check

      - name: Publish to npm
        run: npm publish --access public
